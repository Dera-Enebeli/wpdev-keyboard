<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FORM // 001 — DECONSTRUCTION</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@100;200;300;400;500&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{
  background:#0a0a0f;
  color:rgba(255,255,255,0.92);
  font-family:'Inter',sans-serif;
  min-height:400vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

/* Loading Screen */
#loading-screen{
  position:fixed;inset:0;z-index:1000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:28px;
  background:#0a0a0f;
  transition:opacity 0.8s ease,visibility 0.8s ease;
}
#loading-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.spinner{
  width:52px;height:52px;border-radius:50%;
  background:conic-gradient(#ff2d78 0deg 180deg,#00f0ff 180deg 360deg);
  mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#fff calc(100% - 3px));
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#fff calc(100% - 3px));
  animation:spin 0.9s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{
  font-family:'JetBrains Mono',monospace;
  font-size:13px;font-weight:300;
  letter-spacing:0.15em;
  color:rgba(255,255,255,0.45);
}

/* Scan Lines */
#scanlines{
  position:fixed;inset:0;z-index:2;
  pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent,transparent 2px,
    rgba(255,255,255,0.018) 2px,rgba(255,255,255,0.018) 4px
  );
}

/* Background Glow */
#bg-glow{
  position:fixed;inset:0;z-index:0;
  pointer-events:none;
  background:radial-gradient(ellipse 50% 50% at 50% 50%,rgba(255,45,120,0.06) 0%,rgba(0,240,255,0.04) 30%,transparent 70%);
}

/* Canvas Frame */
#canvas-frame{
  position:fixed;z-index:1;
  top:50%;left:50%;transform:translate(-50%,-50%);
  width:min(90vw,1280px);
  aspect-ratio:1280/720;
  pointer-events:none;
}
#canvas-placeholder{
  width:100%;height:100%;
  background:radial-gradient(ellipse at center,rgba(255,255,255,0.02) 0%,transparent 70%);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:2px;
  position:relative;
  overflow:hidden;
}
#canvas-placeholder::before{
  content:'';position:absolute;inset:0;
  background:
    linear-gradient(90deg,rgba(255,45,120,0.03) 0%,transparent 50%,rgba(0,240,255,0.03) 100%);
}
#canvas-placeholder::after{
  content:'FRAME // 1280x720';position:absolute;
  top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:300;
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.12);
}
.canvas-corner{
  position:absolute;
  width:16px;height:16px;
  border-color:rgba(255,255,255,0.08);
  border-style:solid;
}
.canvas-corner.tl{top:12px;left:12px;border-width:1px 0 0 1px}
.canvas-corner.tr{top:12px;right:12px;border-width:1px 1px 0 0}
.canvas-corner.bl{bottom:12px;left:12px;border-width:0 0 1px 1px}
.canvas-corner.br{bottom:12px;right:12px;border-width:0 1px 1px 0}

/* HUD */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:16px 32px;
  background:rgba(255,255,255,0.02);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  height:56px;
}
#hud::after{
  content:'';position:absolute;bottom:-1px;left:0;right:0;
  height:1px;
  background:linear-gradient(90deg,#ff2d78 0%,#00f0ff 100%);
  opacity:0.3;
}
.hud-left,.hud-right{
  font-family:'JetBrains Mono',monospace;
  font-size:11px;font-weight:400;
  letter-spacing:0.25em;
  text-transform:uppercase;
}
.hud-left{
  color:rgba(255,255,255,0.6);
}
.hud-left span{color:#ff2d78}
.hud-right{
  color:#00f0ff;
  text-shadow:0 0 20px rgba(0,240,255,0.2),0 0 60px rgba(0,240,255,0.1);
}
.hud-divider{
  position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
  width:1px;height:20px;
  background:rgba(255,255,255,0.08);
}

/* Section Text Overlays */
#text-overlays{
  position:fixed;z-index:5;
  bottom:12vh;left:50%;transform:translateX(-50%);
  width:min(90vw,800px);
  pointer-events:none;
}
.section-text{
  position:absolute;bottom:0;left:0;right:0;
  opacity:0;transform:translateY(12px);
  transition:opacity 0.7s cubic-bezier(0.22,1,0.36,1),transform 0.7s cubic-bezier(0.22,1,0.36,1);
  pointer-events:none;
  text-align:center;
}
.section-text.active{
  opacity:1;transform:translateY(0);
}
.section-text .panel{
  display:inline-block;
  padding:24px 40px 28px;
  background:rgba(255,255,255,0.02);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:4px;
  position:relative;
}
.section-text .panel::before{
  content:'';position:absolute;top:-1px;left:20%;right:20%;
  height:1px;
  opacity:0.6;
}
.section-text[data-accent="0"] .panel::before{background:#ff2d78}
.section-text[data-accent="1"] .panel::before{background:#00f0ff}
.section-text[data-accent="2"] .panel::before{background:#ff2d78}
.section-text[data-accent="3"] .panel::before{background:#00f0ff}
.section-text .section-label{
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:400;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:rgba(255,255,255,0.3);
  margin-bottom:12px;
}
.section-text .section-label .num{
  color:rgba(255,255,255,0.5);
}
.section-text h2{
  font-family:'Space Grotesk',sans-serif;
  font-weight:700;font-size:clamp(36px,5vw,64px);
  letter-spacing:-0.02em;
  line-height:1.1;
  color:rgba(255,255,255,0.92);
  margin-bottom:8px;
}
.section-text[data-accent="0"] h2{text-shadow:0 0 40px rgba(255,45,120,0.15),0 0 80px rgba(255,45,120,0.08)}
.section-text[data-accent="1"] h2{text-shadow:0 0 40px rgba(0,240,255,0.15),0 0 80px rgba(0,240,255,0.08)}
.section-text[data-accent="2"] h2{text-shadow:0 0 40px rgba(255,45,120,0.15),0 0 80px rgba(255,45,120,0.08)}
.section-text[data-accent="3"] h2{text-shadow:0 0 40px rgba(0,240,255,0.15),0 0 80px rgba(0,240,255,0.08)}
.section-text p{
  font-family:'Inter',sans-serif;
  font-weight:200;font-size:clamp(14px,1.4vw,18px);
  letter-spacing:0.06em;
  line-height:1.5;
  color:rgba(255,255,255,0.5);
}
.section-text[data-accent="0"] p{color:rgba(255,45,120,0.5)}
.section-text[data-accent="1"] p{color:rgba(0,240,255,0.5)}
.section-text[data-accent="2"] p{color:rgba(255,45,120,0.5)}
.section-text[data-accent="3"] p{color:rgba(0,240,255,0.5)}

/* Progress */
#progress{
  position:fixed;bottom:28px;right:32px;z-index:10;
  display:flex;align-items:center;gap:12px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:400;
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.25);
  text-transform:uppercase;
}
#progress .bar-track{
  width:80px;height:2px;
  background:rgba(255,255,255,0.06);
  border-radius:1px;
  overflow:hidden;
  position:relative;
}
#progress .bar-fill{
  height:100%;width:0%;
  border-radius:1px;
  background:linear-gradient(90deg,#ff2d78,#00f0ff);
  transition:width 0.15s ease;
}
#progress .pct{
  width:28px;text-align:right;
  color:rgba(255,255,255,0.4);
}

/* Scroll Trigger Spacers */
.scroll-trigger{width:100%;pointer-events:none}

/* Footer */
footer{
  position:relative;z-index:3;
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 32px;
  margin-top:0;
  background:rgba(255,255,255,0.015);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-top:1px solid rgba(255,255,255,0.04);
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:300;
  letter-spacing:0.2em;
  color:rgba(255,255,255,0.25);
  text-transform:uppercase;
}
footer span:first-child{
  color:rgba(255,255,255,0.35);
}
footer span:first-child em{font-style:normal;color:#ff2d78}

/* Scrollbar styling */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,0.15)}

/* Responsive */
@media(max-width:768px){
  #hud{padding:12px 20px;height:48px}
  #progress{right:20px;bottom:20px}
  .hud-left,.hud-right{font-size:9px;letter-spacing:0.15em}
  .section-text .panel{padding:20px 24px 24px}
  #text-overlays{bottom:10vh}
  footer{padding:16px 20px;font-size:9px}
}
@media(max-width:480px){
  #hud .hud-divider{display:none}
  .section-text .panel{padding:16px 16px 20px}
}
</style>
</head>
<body>

<!-- Loading Screen -->
<div id="loading-screen">
  <div class="spinner"></div>
  <span class="loading-text">Loading... 0%</span>
</div>

<!-- Scan Lines -->
<div id="scanlines"></div>

<!-- Background Glow -->
<div id="bg-glow"></div>

<!-- Canvas Frame -->
<div id="canvas-frame">
  <div id="canvas-placeholder">
    <div class="canver-corner tl"></div>
    <div class="canver-corner tr"></div>
    <div class="canver-corner bl"></div>
    <div class="canver-corner br"></div>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="hud-left"><span>FORM</span> // 001</div>
  <div class="hud-divider"></div>
  <div class="hud-right">DECONSTRUCTION</div>
</div>

<!-- Section Text Overlays -->
<div id="text-overlays">
  <div class="section-text" data-accent="0" data-section="0">
    <div class="panel">
      <div class="section-label">Section <span class="num">00</span></div>
      <h2>The Whole.</h2>
      <p>Before the first fracture.</p>
    </div>
  </div>
  <div class="section-text" data-accent="1" data-section="1">
    <div class="panel">
      <div class="section-label">Section <span class="num">01</span></div>
      <h2>Unbinding.</h2>
      <p>One piece yields to another.</p>
    </div>
  </div>
  <div class="section-text" data-accent="2" data-section="2">
    <div class="panel">
      <div class="section-label">Section <span class="num">02</span></div>
      <h2>Suspended.</h2>
      <p>Held open in perfect disorder.</p>
    </div>
  </div>
  <div class="section-text" data-accent="3" data-section="3">
    <div class="panel">
      <div class="section-label">Section <span class="num">03</span></div>
      <h2>Return.</h2>
      <p>Every part finds its place.</p>
    </div>
  </div>
</div>

<!-- Scroll Trigger Spacers (create 400vh scroll length) -->
<div class="scroll-trigger" style="height:60vh"></div>
<div class="scroll-trigger" style="height:120vh"></div>
<div class="scroll-trigger" style="height:140vh"></div>
<div class="scroll-trigger" style="height:80vh"></div>

<!-- Progress -->
<div id="progress">
  <span>PROGRESS</span>
  <div class="bar-track"><div class="bar-fill" id="progress-fill"></div></div>
  <span class="pct" id="progress-pct">0%</span>
</div>

<!-- Footer -->
<footer>
  <span><em>FORM</em> // 001</span>
  <span>© 2026</span>
</footer>

<script>
// Loading screen simulation
(function(){
  const loadingScreen = document.getElementById('loading-screen');
  const loadingText = loadingScreen.querySelector('.loading-text');
  let progress = 0;
  const interval = setInterval(function(){
    progress += Math.random() * 18 + 4;
    if(progress >= 100){
      progress = 100;
      clearInterval(interval);
      loadingText.textContent = 'Loading... 100%';
      setTimeout(function(){ loadingScreen.classList.add('hidden'); }, 400);
    }
    loadingText.textContent = 'Loading... ' + Math.floor(progress) + '%';
  }, 180);
})();

// Scroll tracking
(function(){
  const sectionTexts = document.querySelectorAll('.section-text');
  const progressFill = document.getElementById('progress-fill');
  const progressPct = document.getElementById('progress-pct');
  const totalSections = sectionTexts.length;

  function update(){
    var scrollTop = window.scrollY;
    var docHeight = document.documentElement.scrollHeight - window.innerHeight;
    var pct = docHeight > 0 ? Math.min(scrollTop / docHeight, 1) : 0;

    progressFill.style.width = (pct * 100) + '%';
    progressPct.textContent = Math.floor(pct * 100) + '%';

    var activeIdx = 0;
    if(pct >= 0.80) activeIdx = 3;
    else if(pct >= 0.45) activeIdx = 2;
    else if(pct >= 0.15) activeIdx = 1;

    sectionTexts.forEach(function(el, i){
      el.classList.toggle('active', i === activeIdx);
    });
  }

  window.addEventListener('scroll', update, {passive:true});
  window.addEventListener('resize', update, {passive:true});
  update();
})();
</script>
</body>
</html>
